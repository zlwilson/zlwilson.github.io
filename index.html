				class="portfolio-item"
				data-title="SNOWMASTER: Ski Resort Management"
				data-year="2022 – 2025"
				data-client="TechnoAlpin"
				data-role="UX Designer → Project Lead"
				data-tools="User Research, Product Strategy, UX Design, UI Design"
				data-description="
				<p>
					SNOWMASTER is a digital platform for managing snowmaking operations in ski resorts. To redefine the product, we conducted extensive field research with snowmakers across 10 ski resorts in 8 countries, uncovering the realities of mobile, high-pressure work on the mountain.
				</p>
				<p>
					Based on these insights, we developed a user-centered product vision and redesigned the system into a mobile-first experience with a clear, layered information structure. The result is a streamlined interface that supports both quick decision-making and deeper operational control across the entire snowmaking process.
				</p>
				<p>
					My work on this project has been project management, planning and facilitating workshops, defining goals and strategy, planning and conducting user interviews and tests, UX design (user flows, wireframing, prototyping, etc.), and UI design.
				</p>
				<p>
					<a href='https://www.technoalpin.com/en/total-solution/snowmaster-management-software/' target='_blank'>snowmaster.io</a>
				</p>"
				data-image="media/snowmaster-design.png"
				>
				<img src="media/snowmaster.png" alt="Snowmaster resort management software" />
			</button>

			<button
			class="portfolio-item"
			data-title="Digitalization for Construction"
			data-year="2023 - 2025"
			data-client="Arge Baustahl Blasy"
			data-role="UX Designer → Project Lead"
			data-tools="User Research, Journey Mapping, UX Design, UI Design"
			data-description="
			<p>
				ARGE Baustahl Blasy is a construction company specializing in reinforced steel processing. To improve efficiency in complex, multi-stakeholder workflows, we supported the digitalization of their core processes through a progressive web app.
			</p>
			<p>
				Based on workshops and user journey mapping, we designed a cross-platform application for on-site and office use, enabling project coordination, time tracking and communication. The result is a scalable digital workflow that is used daily by employees and continuously evolving based on user and business needs.
			</p>
			<p>
				My work on this project has been project management, planning and facilitating workshops, defining goals and strategy, planning user interviews and tests, UX design (user flows, wireframing, prototyping, etc.), and UI design.
			</p>"
			data-image="media/blasy-all.png"
			>
			<img src="media/blasy.png" alt="Blasy VerlegeApp: PM tool for Construction" />
		</button>

		<button
		class="portfolio-item"
		data-title="Video Wall and Control Room Screen design"
		data-year="2024-25"
		data-client="ClonBio: PannoniaBio"
		data-role="Project Lead"
		data-tools="User Research, Prototyping, UX Design, UI Design"
		data-description="
		<p>
			ClonBio runs the largest ethanol refining plant in Europe. The entire plant is controlled from two rooms on the edge of the factory complex. They came to us with the task to design a wall-sized display for their engineers to monitor overall factory status, plus dashboards for the operators to quickly control specific areas.
		</p>
		<p>
			I led the collectiion of requirements from all relevant stakeholders – including engineers, operators, and management – followed by six iterative design and testing cycles to develop an optimized human-machine interface. A combination of prototyping and user-testing, plus workshops and design rounds to develope creative solutions, test them, and finally releasing them.
		</p>
		<p>
			My role in this project was project management, planning and facilitating workshops to align all ClonBio stakeholders on goals and expectations, planning and executing the user research, design drafts for feedback and testing, and final UI design. I also provided on-going supported during the implementation, leading the standups between the developers and project owners from ClonBio.
		</p>
		<p>
			Images changed from real designs due to privacy.
		</p>"
		data-image="media/clonbio-design.png"
		>
		<img src="media/clonbio.png" alt="Recreation of video wall in factory" />
	</button>

<button
class="portfolio-item"
data-title="Luloop: Circular Revolution"
data-year="2023"
data-client="Luloop"
data-role="Design Lead"
data-tools="User Research, Business Strategy, Service Design, Prototyping"
data-description="
<p>
	Luloop is a new reusable container system developed in response to brand new EU regulations regarding single-use food-containers. Within a 5-day design sprint, we developed a complete business model, service concept and initial digital prototype, to enable a lightning-fast market entry.
</p>
<p>
	The solution includes a complete pickup and return system for reusable containers, through restaurants with a clear value proposition (and pricing) for gastronomy-partners and end-users.
	Based on user research, we created a complete service blueprint and an app prototype, to position Luloop as a scalable, sustainable service-driven product.
</p>
<p>
	My role in the project was to plan and facilitate the sprint, with a focus on the digital product design (branding, user flows, prototypes). Before and after the sprint I also planned and conducted user research to gather more user data in the field, and ran several strategy workshops with the Luloop team.
</p>
<p>
	Luloop has since been aquired by <a href='https://www.vytal.org' target='_blank'>Vytal</a>.
</p>"
data-image="media/luloop-design.png"
>
<img src="media/luloop.png" alt="Luloop landing page and app from design sprint" />
</button>
